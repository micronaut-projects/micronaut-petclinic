name: Release

on:
  push:
    branches:
      - master
      - "[0-9]*.[0-9]*.x"
    paths:
      - gradle/libs.versions.toml

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch tags
        run: git fetch --tags --force

      - name: Read Micronaut version
        id: version
        env:
          GITHUB_EVENT_BEFORE: ${{ github.event.before }}
        run: |
          python - <<'PY' > /tmp/version.txt
          import os
          import subprocess
          from pathlib import Path
          import tomllib


          def read_micronaut_version(path):
              data = tomllib.loads(path.read_text())
              return data.get('versions', {}).get('micronaut-platform', '')


          def read_micronaut_version_from_text(text):
              data = tomllib.loads(text)
              return data.get('versions', {}).get('micronaut-platform', '')


          current_version = read_micronaut_version(Path('gradle/libs.versions.toml'))
          if not current_version:
              raise SystemExit('versions.micronaut-platform not found in gradle/libs.versions.toml')

          before = os.environ.get('GITHUB_EVENT_BEFORE', '')
          previous_version = ''
          if before and before != '0000000000000000000000000000000000000000':
              try:
                  old_toml = subprocess.check_output(['git', 'show', f'{before}:gradle/libs.versions.toml'], text=True)
                  previous_version = read_micronaut_version_from_text(old_toml)
              except Exception:
                  pass

          version_changed = str(previous_version != current_version).lower()

          print(f'version={current_version}')
          print(f'tag=v{current_version}')
          print(f'current_version={current_version}')
          print(f'previous_version={previous_version}')
          print(f'version_changed={version_changed}')
          PY
          echo "version=$(grep '^version=' /tmp/version.txt | cut -d= -f2)" >> "$GITHUB_OUTPUT"
          echo "tag=$(grep '^tag=' /tmp/version.txt | cut -d= -f2)" >> "$GITHUB_OUTPUT"
          echo "version_changed=$(grep '^version_changed=' /tmp/version.txt | cut -d= -f2)" >> "$GITHUB_OUTPUT"

      - name: Check if tag already exists
        id: check
        if: steps.version.outputs.version_changed == 'true'
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          if git rev-parse "refs/tags/${TAG}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create tag
        if: steps.version.outputs.version_changed == 'true' && steps.check.outputs.exists != 'true'
        run: |
          git tag "${{ steps.version.outputs.tag }}"
          git push origin "${{ steps.version.outputs.tag }}"

      - name: Create GitHub Release
        if: steps.version.outputs.version_changed == 'true' && steps.check.outputs.exists != 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          generate_release_notes: true
