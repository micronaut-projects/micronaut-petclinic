version: '3.8'

services:
  # Micronaut Pet Clinic Application (H2 - default)
  app:
    build:
      context: .
      target: jvm
    ports:
      - "8080:8080"
    environment:
      - MICRONAUT_ENVIRONMENTS=default
    profiles:
      - app

  mysql:
    image: mysql:9.2
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: petclinic
      MYSQL_USER: petclinic
      MYSQL_PASSWORD: petclinic
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 5s
      retries: 10
    profiles:
      - mysql

  app-mysql:
    build:
      context: .
      target: jvm
    ports:
      - "8080:8080"
    environment:
      - MICRONAUT_ENVIRONMENTS=mysql
      - DATASOURCES_DEFAULT_URL=jdbc:mysql://mysql:3306/petclinic
    depends_on:
      mysql:
        condition: service_healthy
    profiles:
      - mysql

  postgres:
    image: postgres:18.0
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: petclinic
      POSTGRES_USER: petclinic
      POSTGRES_PASSWORD: petclinic
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U petclinic"]
      timeout: 5s
      retries: 10
    profiles:
      - postgres

  app-postgres:
    build:
      context: .
      target: jvm
    ports:
      - "8080:8080"
    environment:
      - MICRONAUT_ENVIRONMENTS=postgres
      - DATASOURCES_DEFAULT_URL=jdbc:postgresql://postgres:5432/petclinic
    depends_on:
      postgres:
        condition: service_healthy
    profiles:
      - postgres

  oracle:
    image: container-registry.oracle.com/database/free:23.26.0.0-lite-arm64
    ports:
      - "1521:1521"
    environment:
      ORACLE_PWD: petclinic
    volumes:
      - oracle_data:/opt/oracle/oradata
      - ./docker/oracle:/opt/oracle/scripts/startup
    healthcheck:
      test: ["CMD-SHELL", "echo 'SELECT 1 FROM DUAL;' | sqlplus -s petclinic/petclinic@localhost:1521/FREEPDB1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 20
      start_period: 300s
    profiles:
      - oracle

  app-oracle:
    build:
      context: .
      target: jvm
    ports:
      - "8080:8080"
    environment:
      - MICRONAUT_ENVIRONMENTS=oracle
      - DATASOURCES_DEFAULT_URL=jdbc:oracle:thin:@oracle:1521/FREEPDB1
    depends_on:
      oracle:
        condition: service_healthy
    profiles:
      - oracle

volumes:
  mysql_data:
  postgres_data:
  oracle_data: