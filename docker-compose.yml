version: '3.8'

services:
  # Micronaut Pet Clinic Application (H2 - default)
  app:
    build:
      context: .
      target: jvm
    ports:
      - "8080:8080"
    environment:
      - MICRONAUT_ENVIRONMENTS=default
    profiles:
      - app

  mysql:
    image: mysql:9.2
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: petclinic
      MYSQL_USER: petclinic
      MYSQL_PASSWORD: petclinic
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 5s
      retries: 10
    profiles:
      - mysql

  app-mysql:
    build:
      context: .
      target: jvm
    ports:
      - "8080:8080"
    environment:
      - MICRONAUT_ENVIRONMENTS=mysql
      - DATASOURCES_DEFAULT_URL=jdbc:mysql://mysql:3306/petclinic
    depends_on:
      mysql:
        condition: service_healthy
    profiles:
      - mysql

  postgres:
    image: postgres:18.0
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: petclinic
      POSTGRES_USER: petclinic
      POSTGRES_PASSWORD: petclinic
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U petclinic"]
      timeout: 5s
      retries: 10
    profiles:
      - postgres

  app-postgres:
    build:
      context: .
      target: jvm
    ports:
      - "8080:8080"
    environment:
      - MICRONAUT_ENVIRONMENTS=postgres
      - DATASOURCES_DEFAULT_URL=jdbc:postgresql://postgres:5432/petclinic
    depends_on:
      postgres:
        condition: service_healthy
    profiles:
      - postgres
volumes:
  mysql_data:
  postgres_data: