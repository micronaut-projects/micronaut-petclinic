# MySQL Configuration Profile
datasources:
  default:
    url: jdbc:mysql://localhost:3306/petclinic
    username: petclinic
    password: petclinic
    driver-class-name: com.mysql.cj.jdbc.Driver
    dialect: MYSQL

jpa:
  default:
    properties:
      hibernate:
        hbm2ddl:
          auto: update
        dialect: org.hibernate.dialect.MySQLDialect
