<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head}"></head>
<body class="d-flex flex-column min-vh-100">

<nav th:replace="~{fragments/layout :: navigation}"></nav>

<!-- Page Header -->
<div class="page-header">
    <div class="container">
        <h1><i class="fas fa-calendar-plus me-3"></i><span th:text="#{visit.new}">New Visit</span></h1>
        <p th:if="${pet != null}">
            <i class="fas fa-paw me-2"></i><span th:text="#{pet.name}">Pet</span>: <span th:text="${pet.name}">Pet Name</span>
        </p>
    </div>
</div>

<main class="container flex-grow-1 py-4">
    <div class="row">
        <!-- Back Button -->
        <div class="col-12 mb-4">
            <a th:href="@{/owners/{ownerId}(ownerId=${owner.id})}" class="btn btn-secondary">
                <i class="fas fa-arrow-left me-2"></i><span th:text="#{pet.backToOwner}">Back to Owner</span>
            </a>
        </div>

        <!-- Pet Info Card -->
        <div class="col-lg-4 mb-4">
            <div class="detail-card animate-fade-in-up" th:if="${pet != null}">
                <div class="card-header">
                    <h5 class="mb-0"><i class="fas fa-paw me-2"></i><span th:text="#{pet.information}">Pet Information</span></h5>
                </div>
                <div class="detail-body">
                    <div class="text-center mb-4">
                        <div class="pet-icon mx-auto mb-3" style="width: 80px; height: 80px; font-size: 2rem;"
                             th:classappend="${pet.type != null ? pet.type.name.toLowerCase() : 'dog'}">
                            <i class="fas fa-paw"></i>
                        </div>
                        <h5 th:text="${pet.name}">Pet Name</h5>
                    </div>
                    <div class="info-row">
                        <div class="info-label" th:text="#{visit.type}">Type</div>
                        <div class="info-value" th:text="${pet.type != null ? pet.type.name : #{visit.unknown}}">Type</div>
                    </div>
                    <div class="info-row">
                        <div class="info-label" th:text="#{pet.birthDate}">Birth Date</div>
                        <div class="info-value" th:text="${pet.birthDate}">Date</div>
                    </div>
                    <div class="info-row" th:if="${owner != null}">
                        <div class="info-label" th:text="#{pet.owner}">Owner</div>
                        <div class="info-value" th:text="${owner.firstName + ' ' + owner.lastName}">Owner</div>
                    </div>
                </div>
            </div>

            <!-- Previous Visits -->
            <div th:if="${pet != null and pet.visits != null and !pet.visits.isEmpty()}" 
                 class="card mt-4 animate-fade-in-up stagger-1">
                <div class="card-header">
                    <h5 class="mb-0"><i class="fas fa-history me-2"></i><span th:text="#{pet.previousVisits}">Previous Visits</span></h5>
                </div>
                <div class="card-body">
                    <div class="visit-timeline">
                        <div th:each="previousVisit : ${pet.visits}" class="visit-item">
                            <div class="visit-date" th:text="${previousVisit.date}">Date</div>
                            <div class="visit-description" th:text="${previousVisit.description}">Description</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Visit Form -->
        <div class="col-lg-8">
            <div class="form-container animate-fade-in-up stagger-2" th:if="${owner != null and pet != null}">
                <div class="text-center mb-4">
                    <div class="feature-icon gradient-3 mx-auto mb-3">
                        <i class="fas fa-stethoscope"></i>
                    </div>
                    <h4 th:text="#{visit.scheduleNew}">Schedule a New Visit</h4>
                    <p class="text-muted"><span th:text="#{visit.recordFor}">Record a visit for</span> <span th:text="${pet.name}">Pet</span></p>
                </div>

                <div th:if="${error}" class="alert alert-danger mb-4">
                    <i class="fas fa-exclamation-circle me-2"></i>
                    <span th:text="${error}">Error message</span>
                </div>

                <form th:action="@{/owners/{ownerId}/pets/{petId}/visits/new(ownerId=${owner.id}, petId=${pet.id})}" 
                      method="post" class="needs-validation" novalidate>
                    
                    <div class="mb-4">
                        <label for="date" class="form-label">
                            <i class="fas fa-calendar me-2 text-primary"></i><span th:text="#{visit.visitDate}">Visit Date</span>
                        </label>
                        <input type="date" class="form-control" id="date" name="date"
                               th:value="${visit != null ? visit.date : ''}" required>
                        <div class="invalid-feedback" th:text="#{validation.visitDate.required}">Visit date is required.</div>
                    </div>

                    <div class="mb-4">
                        <label for="description" class="form-label">
                            <i class="fas fa-notes-medical me-2 text-primary"></i><span th:text="#{visit.description}">Description</span>
                        </label>
                        <textarea class="form-control" id="description" name="description" rows="4"
                                  th:placeholder="#{placeholder.visitDescription}"
                                  th:text="${visit != null ? visit.description : ''}" required></textarea>
                        <div class="invalid-feedback" th:text="#{validation.description.required}">Description is required.</div>
                    </div>

                    <hr class="my-4">

                    <div class="d-flex gap-3">
                        <button type="submit" class="btn btn-primary btn-lg flex-grow-1">
                            <i class="fas fa-plus me-2"></i><span th:text="#{visit.addNew}">Add Visit</span>
                        </button>
                        <a th:href="@{/owners/{ownerId}(ownerId=${owner.id})}" class="btn btn-secondary btn-lg">
                            <i class="fas fa-times me-2"></i><span th:text="#{button.cancel}">Cancel</span>
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</main>

<footer th:replace="~{fragments/layout :: footer}"></footer>
<div th:replace="~{fragments/layout :: scripts}"></div>

<script>
    (function () {
        'use strict';
        var forms = document.querySelectorAll('.needs-validation');
        Array.prototype.slice.call(forms).forEach(function (form) {
            form.addEventListener('submit', function (event) {
                if (!form.checkValidity()) {
                    event.preventDefault();
                    event.stopPropagation();
                }
                form.classList.add('was-validated');
            }, false);
        });
    })();
</script>

</body>
</html>
