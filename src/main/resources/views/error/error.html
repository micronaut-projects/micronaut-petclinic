<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head}"></head>
<body class="d-flex flex-column min-vh-100">

<nav th:replace="~{fragments/layout :: navigation}"></nav>

<main class="container flex-grow-1 d-flex align-items-center justify-content-center py-5">
    <div class="text-center animate-fade-in-up">
        <div class="mb-4">
            <div class="feature-icon gradient-2 mx-auto" style="width: 120px; height: 120px; font-size: 3rem;">
                <i class="fas fa-exclamation-triangle"></i>
            </div>
        </div>
        <h1 class="display-4 mb-3" th:text="#{error.title}">Oops! Something went wrong</h1>
        <p class="lead text-muted mb-4" th:text="#{error.message}">
            We encountered an unexpected error while processing your request.
        </p>
        <div th:if="${message}" class="alert alert-danger d-inline-block mb-4">
            <i class="fas fa-info-circle me-2"></i>
            <span th:text="${message}">Error details</span>
        </div>
        <div class="d-flex justify-content-center gap-3">
            <a th:href="@{/}" class="btn btn-primary btn-lg">
                <i class="fas fa-home me-2"></i><span th:text="#{error.goHome}">Go Home</span>
            </a>
            <button onclick="history.back()" class="btn btn-secondary btn-lg">
                <i class="fas fa-arrow-left me-2"></i><span th:text="#{error.goBack}">Go Back</span>
            </button>
        </div>
    </div>
</main>

<footer th:replace="~{fragments/layout :: footer}"></footer>
<div th:replace="~{fragments/layout :: scripts}"></div>

</body>
</html>
