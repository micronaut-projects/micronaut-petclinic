<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head}"></head>
<body class="d-flex flex-column min-vh-100">

<nav th:replace="~{fragments/layout :: navigation}"></nav>

<!-- Page Header -->
<div class="page-header">
    <div class="container">
        <h1>
            <i th:class="${isNew} ? 'fas fa-user-plus me-3' : 'fas fa-user-edit me-3'"></i>
            <span th:text="${isNew} ? #{owner.new} : #{owner.edit}">Owner Form</span>
        </h1>
        <p th:text="${isNew} ? #{form.newOwner.desc} : #{form.editOwner.desc}">Form description</p>
    </div>
</div>

<main class="container flex-grow-1 py-4">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <!-- Back Button -->
            <a th:href="${isNew} ? @{/owners/find} : @{/owners/{ownerId}(ownerId=${owner.id})}" class="btn btn-secondary mb-4">
                <i class="fas fa-arrow-left me-2"></i><span th:text="#{button.back}">Back</span>
            </a>

            <!-- Form Card -->
            <div class="form-container animate-fade-in-up">
                <div th:if="${error}" class="alert alert-danger mb-4">
                    <i class="fas fa-exclamation-circle me-2"></i>
                    <span th:text="${error}">Error message</span>
                </div>

                <form th:action="${isNew} ? @{/owners/new} : @{/owners/{ownerId}/edit(ownerId=${owner.id})}" 
                      method="post" class="needs-validation" novalidate>
                    
                    <div class="row mb-4">
                        <div class="col-md-6 mb-3 mb-md-0">
                            <label for="firstName" class="form-label">
                                <i class="fas fa-user me-2 text-primary"></i><span th:text="#{owner.firstName}">First Name</span>
                            </label>
                            <input type="text" class="form-control" id="firstName" name="firstName"
                                   th:value="${owner != null ? owner.firstName : ''}" 
                                   th:placeholder="#{placeholder.firstName}" required>
                            <div class="invalid-feedback" th:text="#{validation.firstName.required}">First name is required.</div>
                        </div>
                        <div class="col-md-6">
                            <label for="lastName" class="form-label">
                                <i class="fas fa-user me-2 text-primary"></i><span th:text="#{owner.lastName}">Last Name</span>
                            </label>
                            <input type="text" class="form-control" id="lastName" name="lastName"
                                   th:value="${owner != null ? owner.lastName : ''}" 
                                   th:placeholder="#{placeholder.lastName}" required>
                            <div class="invalid-feedback" th:text="#{validation.lastName.required}">Last name is required.</div>
                        </div>
                    </div>

                    <div class="mb-4">
                        <label for="address" class="form-label">
                            <i class="fas fa-home me-2 text-primary"></i><span th:text="#{owner.address}">Address</span>
                        </label>
                        <input type="text" class="form-control" id="address" name="address"
                               th:value="${owner != null ? owner.address : ''}" 
                               th:placeholder="#{placeholder.address}" required>
                        <div class="invalid-feedback" th:text="#{validation.address.required}">Address is required.</div>
                    </div>

                    <div class="row mb-4">
                        <div class="col-md-6 mb-3 mb-md-0">
                            <label for="city" class="form-label">
                                <i class="fas fa-city me-2 text-primary"></i><span th:text="#{owner.city}">City</span>
                            </label>
                            <input type="text" class="form-control" id="city" name="city"
                                   th:value="${owner != null ? owner.city : ''}" 
                                   th:placeholder="#{placeholder.city}" required>
                            <div class="invalid-feedback" th:text="#{validation.city.required}">City is required.</div>
                        </div>
                        <div class="col-md-6">
                            <label for="telephone" class="form-label">
                                <i class="fas fa-phone me-2 text-primary"></i><span th:text="#{owner.telephone}">Telephone</span>
                            </label>
                            <input type="tel" class="form-control" id="telephone" name="telephone"
                                   th:value="${owner != null ? owner.telephone : ''}" 
                                   th:placeholder="#{placeholder.telephone}" pattern="[0-9]{10}" required>
                            <div class="invalid-feedback" th:text="#{validation.telephone}">Please enter a valid 10-digit telephone number.</div>
                        </div>
                    </div>

                    <hr class="my-4">

                    <div class="d-flex gap-3">
                        <button type="submit" class="btn btn-primary btn-lg flex-grow-1">
                            <i th:class="${isNew} ? 'fas fa-plus me-2' : 'fas fa-save me-2'"></i>
                            <span th:text="${isNew} ? #{button.addOwner} : #{button.updateOwner}">Submit</span>
                        </button>
                        <a th:href="${isNew} ? @{/owners/find} : @{/owners/{ownerId}(ownerId=${owner.id})}" 
                           class="btn btn-secondary btn-lg">
                            <i class="fas fa-times me-2"></i><span th:text="#{button.cancel}">Cancel</span>
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</main>

<footer th:replace="~{fragments/layout :: footer}"></footer>
<div th:replace="~{fragments/layout :: scripts}"></div>

<script>
    // Bootstrap validation
    (function () {
        'use strict';
        var forms = document.querySelectorAll('.needs-validation');
        Array.prototype.slice.call(forms).forEach(function (form) {
            form.addEventListener('submit', function (event) {
                if (!form.checkValidity()) {
                    event.preventDefault();
                    event.stopPropagation();
                }
                form.classList.add('was-validated');
            }, false);
        });
    })();
</script>

</body>
</html>
