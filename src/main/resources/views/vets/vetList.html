<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head}"></head>
<body class="d-flex flex-column min-vh-100">

<nav th:replace="~{fragments/layout :: navigation}"></nav>

<!-- Page Header -->
<div class="page-header">
    <div class="container">
        <h1><i class="fas fa-user-md me-3"></i><span th:text="#{vet.ourVeterinarians}">Our Veterinarians</span></h1>
        <p th:text="#{vet.meetTeam}">Meet our team of expert veterinary professionals</p>
    </div>
</div>

<main class="container flex-grow-1 py-4">
    <!-- Stats Bar -->
    <div class="row g-4 mb-5">
        <div class="col-md-4">
            <div class="card h-100">
                <div class="card-body d-flex align-items-center">
                    <div class="feature-icon gradient-1 me-3" style="width: 50px; height: 50px; font-size: 1.25rem;">
                        <i class="fas fa-user-md"></i>
                    </div>
                    <div>
                        <h3 class="mb-0" th:text="${vets != null ? #lists.size(vets) : 0}">0</h3>
                        <p class="text-muted mb-0" th:text="#{vet.veterinarians}">Veterinarians</p>
                    </div>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card h-100">
                <div class="card-body d-flex align-items-center">
                    <div class="feature-icon gradient-2 me-3" style="width: 50px; height: 50px; font-size: 1.25rem;">
                        <i class="fas fa-award"></i>
                    </div>
                    <div>
                        <h3 class="mb-0" th:text="#{vet.expert}">Expert</h3>
                        <p class="text-muted mb-0" th:text="#{vet.careQuality}">Care Quality</p>
                    </div>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card h-100">
                <div class="card-body d-flex align-items-center">
                    <div class="feature-icon gradient-4 me-3" style="width: 50px; height: 50px; font-size: 1.25rem;">
                        <i class="fas fa-clock"></i>
                    </div>
                    <div>
                        <h3 class="mb-0">24/7</h3>
                        <p class="text-muted mb-0" th:text="#{vet.availability}">Availability</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Vets Grid -->
    <div class="row g-4">
        <div th:each="vet, iterStat : ${vets}" class="col-md-6 col-lg-4">
            <div class="vet-card animate-fade-in-up" th:style="'animation-delay: ' + ${iterStat.index * 0.1} + 's'">
                <div class="vet-card-header">
                    <div class="vet-avatar">
                        <i class="fas fa-user-md"></i>
                    </div>
                </div>
                <div class="vet-card-body">
                    <h5 th:text="${vet.firstName + ' ' + vet.lastName}">Dr. John Smith</h5>
                    
                    <div th:if="${vet.specialties != null and !vet.specialties.isEmpty()}" class="mt-3">
                        <span th:each="specialty : ${vet.specialties}" 
                              class="specialty-badge"
                              th:text="${specialty.name}">Specialty</span>
                    </div>
                    <div th:unless="${vet.specialties != null and !vet.specialties.isEmpty()}" class="mt-3">
                        <span class="specialty-badge" style="background: rgba(100, 116, 139, 0.1); color: #64748b;" th:text="#{vet.generalPractice}">
                            General Practice
                        </span>
                    </div>

                    <div class="mt-4 pt-3 border-top">
                        <div class="d-flex justify-content-center gap-3">
                            <span class="text-muted small">
                                <i class="fas fa-certificate text-warning me-1"></i><span th:text="#{vet.licensed}">Licensed</span>
                            </span>
                            <span class="text-muted small">
                                <i class="fas fa-star text-warning me-1"></i><span th:text="#{vet.topRated}">Top Rated</span>
                            </span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Empty State -->
    <div th:if="${vets == null or vets.isEmpty()}" class="empty-state">
        <div class="empty-state-icon">
            <i class="fas fa-user-md"></i>
        </div>
        <h3 th:text="#{vet.noVeterinarians}">No Veterinarians Found</h3>
        <p th:text="#{vet.noVeterinariansMessage}">There are no veterinarians registered in the system yet.</p>
    </div>
</main>

<footer th:replace="~{fragments/layout :: footer}"></footer>
<div th:replace="~{fragments/layout :: scripts}"></div>

</body>
</html>
